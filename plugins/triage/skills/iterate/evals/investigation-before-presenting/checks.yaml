checks:
  - investigates-project-before-first-ask:
      check: "At least one Read tool call targeting a recognized project file (manifest files such as pyproject.toml, setup.py, setup.cfg, requirements.txt, package.json, Cargo.toml, go.mod, Gemfile, pom.xml, README.md, or similar project-defining files), or a Glob/Bash tool call enumerating project files, appears in the transcript before the first AskUserQuestion tool call or advanced-ask Skill invocation"
      note: "The iterate skill's artifact rule requires investigation before presentation. For a Missing README finding, investigation means discovering the project's actual content — typically by reading a manifest file or listing project files."
  - investigates-between-asks:
      check: "At least one Read, Grep, Glob, or Bash tool call appears in the transcript between the first AskUserQuestion tool call or advanced-ask Skill invocation and the second AskUserQuestion tool call or advanced-ask Skill invocation"
      note: "Each finding gets its own investigation. Between the README and LICENSE approval prompts, the agent should investigate the license state (e.g., re-check pyproject.toml's license field, or Glob for existing license indicators)."
  - presentation-references-concrete-evidence:
      check: "At least one of the following concrete project details appears in the agent's message content or in the question text of an AskUserQuestion tool call before or during the first approval prompt: the function signature 'def main()' or 'main()' with parentheses, the literal token 'argparse' or 'ArgumentParser', or the filename 'src/csv_to_kdl/cli.py' (full path, not just 'cli.py')"
      note: "The iterate skill's artifact rule states: 'The presentation must reference specific findings from this investigation — file paths, current values, concrete state discovered.' A presentation that restates the finding title without citing project-specific details discovered during investigation means the investigation was skipped or its results were not used. The prompt deliberately withholds project context and the user persona refuses to volunteer it — the agent must discover and cite these details from cli.py."
