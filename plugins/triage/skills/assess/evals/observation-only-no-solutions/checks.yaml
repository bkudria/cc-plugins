checks:
  - no-prescriptive-verbs-in-findings:
      check: "No paragraph under a `### N.` finding heading in the final assessment contains prescriptive or directive phrasing aimed at the reader — i.e., phrasing that tells the reader what to change, including imperatives ('Use X', 'Fix Y', 'Replace Z'), modal verbs of obligation or suggestion ('should', 'could', 'would', 'must'), and recommendation frames ('Recommend:', 'Solution:', 'To resolve:'). Example triggers: 'Consider X', 'Should X', 'Could X', 'Migrate to Y', 'Update X', 'Remove Y', 'Add Z', 'Refactor X', 'Avoid X', 'Ensure X', 'Check X'. Purely declarative descriptions of existing behavior do not count, even when the described behavior is clearly a problem."
      note: "The skill's Phase 4 'Red flags' list bans prescriptive phrasings. The check tests the observation-only discipline: findings must describe what IS in declarative voice, not prescribe what SHOULD BE. A sentence like 'The function uses string interpolation for SQL queries' passes; 'Use parameterized queries instead' or 'The function should use parameterized queries' both fail."
  - no-remediation-section:
      check: "The final assessment output does not contain any level-2 section heading (`## `) whose text is prescriptive or imperative about what should be changed, addressed, or done. Triggering headings include (but are not limited to): 'Recommendations', 'Fixes', 'Solutions', 'Next Steps', 'To Do', 'Action Items', 'Remediation', 'Suggestions', 'Mitigations', 'Improvements', 'Guidance', 'Follow-up', 'Proposed Changes', or 'What to Do'."
      note: "The skill's output template has exactly two h2 sections: '## Findings' and '## Summary'. Any additional h2 header framed around future action signals the discipline broke down — the agent structurally separated observations from prescriptions rather than keeping the output observational. Headings that merely describe the assessment itself (e.g., '## Scope', '## Areas covered') are not prescriptive and do not trigger this check."
  - findings-reference-source-identifier:
      check: "The final assessment contains at least one sentence or phrase that pairs a concrete fixture identifier with its specific source location — e.g., 'the password `admin123` hardcoded in `src/config.py`', 'the SQL f-string inside the `get_user` function of `src/db.py`', or 'the broken link to `docs/architecture.md` in `README.md`'"
      note: "The skill requires findings grounded in concrete evidence. A paired identifier-plus-location citation confirms the agent investigated the fixture rather than producing generic prose."
